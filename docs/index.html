<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zylora — Вход</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #f8fafc;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        #status {
            font-weight: bold;
            color: #a78bfa;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Zylora Auth Proxy</h1>
        <p>Безопасный мост авторизации. Пожалуйста, не закрывайте окно, идёт инициализация Firebase...</p>
        <div id="status">⏳ Загрузка SDK...</div>
    </div>

    <!-- Firebase SDK загружается напрямую через CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const extId = urlParams.get('extId');
        const statusEl = document.getElementById('status');

        if (!extId) {
            statusEl.textContent = '❌ Ошибка: В URL не передан ID расширения (?extId=...). Страница открыта не из расширения.';
            statusEl.style.color = '#f87171';
            throw new Error('No Extension ID provided');
        }

        /* 
           ВАЖНО: Перед тем как закидывать в GitHub, скопируйте сюда 
           кэши Firebase из вашего .env.local 
        */
        const firebaseConfig = {
            apiKey: "AIzaSyB58VAEi47EXEemQ0A8Xq_YRVuOPE_1WDI",
            authDomain: "zylora-e85ed.firebaseapp.com",
            projectId: "zylora-e85ed",
            storageBucket: "zylora-e85ed.firebasestorage.app",
            messagingSenderId: "1005813307713",
            appId: "1:1005813307713:web:780d397010a5de136269c0"
        };

        if (firebaseConfig.apiKey === "ВСТАВИТЬ_API_KEY") {
            statusEl.innerHTML = '⚠️ <b>ОШИБКА НАСТРОЙКИ:</b><br/>Откройте файл <code>docs/index.html</code> в редакторе кода и впишите строку apiKey и authDomain (на строках 42-43).<br/>Без этого авторизация Google не заработает.';
            statusEl.style.color = '#fbbf24';
            throw new Error('Firebase config empty');
        }

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            statusEl.textContent = '🔒 Ожидание входа через Google...';

            signInWithPopup(auth, provider)
                .then((result) => {
                    const credential = GoogleAuthProvider.credentialFromResult(result);

                    statusEl.textContent = '✅ Авторизация успешна! Отправка ключа в расширение...';

                    // Отправляем токен обратно в расширение (по его уникальному ID)
                    try {
                        chrome.runtime.sendMessage(extId, {
                            type: "AUTH_SUCCESS",
                            idToken: credential.idToken,
                            accessToken: credential.accessToken
                        }, (response) => {
                            if (chrome.runtime.lastError) {
                                statusEl.textContent = '⚠️ Сервер ответил, но расширение не уловило. Закройте вкладку.';
                            } else {
                                statusEl.textContent = '🎉 Готово! Можете закрывать вкладку.';
                                statusEl.style.color = '#34d399';
                                setTimeout(() => window.close(), 1500);
                            }
                        });
                    } catch (sendMessageError) {
                        statusEl.textContent = '⚠️ Не удалось отправить сообщение в расширение. Проверьте externally_connectable в manifest.json';
                        statusEl.style.color = '#fbbf24';
                    }
                }).catch((error) => {
                    statusEl.textContent = '❌ Ошибка входа Google: ' + error.message;
                    statusEl.style.color = '#f87171';
                });
        } catch (e) {
            statusEl.textContent = '❌ Критическая ошибка инициализации: ' + e.message;
            statusEl.style.color = '#f87171';
        }
    </script>
</body>

</html>
